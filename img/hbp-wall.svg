<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs><linearGradient id="b3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0710"/><stop offset="100%" stop-color="#1a1226"/></linearGradient></defs>
  <rect width="1280" height="800" fill="url(#b3)"/>
  <text x="64" y="96" font-family="Orbitron, sans-serif" font-size="32" font-weight="700" fill="#ff9ec8">The Responsibility Wall</text>
  <g font-family="Inter, sans-serif" font-style="italic">
    <g transform="rotate(-3 0 0)"><rect x="80" y="150" width="330" height="120" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,126,176,0.35)"/><text x="100" y="200" font-size="19" fill="#eaf3ff">"Userò l'AI per esplorare,</text><text x="100" y="228" font-size="19" fill="#eaf3ff">ma non le delegherò il senso."</text></g>
    <g transform="rotate(2 0 0)"><rect x="470" y="180" width="330" height="120" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(116,224,255,0.35)"/><text x="490" y="230" font-size="19" fill="#eaf3ff">"…ma non le delegherò</text><text x="490" y="258" font-size="19" fill="#eaf3ff">le mie domande."</text></g>
    <g transform="rotate(-2 0 0)"><rect x="860" y="150" width="330" height="120" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(180,140,255,0.35)"/><text x="880" y="200" font-size="19" fill="#eaf3ff">"Userò l'AI per accelerare,</text><text x="880" y="228" font-size="19" fill="#eaf3ff">ma non per smettere di pensare."</text></g>
    <g transform="rotate(3 0 0)"><rect x="180" y="340" width="330" height="120" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,180,84,0.35)"/><text x="200" y="390" font-size="19" fill="#eaf3ff">"…ma non le delegherò</text><text x="200" y="418" font-size="19" fill="#eaf3ff">la responsabilità."</text></g>
    <g transform="rotate(-1 0 0)"><rect x="640" y="360" width="360" height="120" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,126,176,0.35)"/><text x="660" y="410" font-size="19" fill="#eaf3ff">"Userò l'AI come strumento,</text><text x="660" y="438" font-size="19" fill="#eaf3ff">non come autore."</text></g>
  </g>
  <text x="64" y="600" font-family="Orbitron, sans-serif" font-size="40" font-weight="700" fill="#eaf3ff">Le voci diventano</text>
  <text x="64" y="652" font-family="Orbitron, sans-serif" font-size="40" font-weight="700" fill="url(#b3)" stroke="#74e0ff" stroke-width="0.5">un'opera collettiva.</text>
  <text x="64" y="652" font-family="Orbitron, sans-serif" font-size="40" font-weight="700" fill="#74e0ff">un'opera collettiva.</text>
</svg>
