<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#080a14"/><stop offset="100%" stop-color="#101524"/></linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#b2)"/>
  <text x="64" y="90" font-family="Orbitron, sans-serif" font-size="34" font-weight="700" fill="#eaf3ff">Il percorso · 4 aree</text>
  <g font-family="Inter, sans-serif">
    <!-- 1 -->
    <rect x="64" y="140" width="560" height="250" rx="16" fill="rgba(116,224,255,0.07)" stroke="rgba(120,200,255,0.3)"/>
    <text x="92" y="200" font-family="Orbitron, sans-serif" font-size="22" fill="#74e0ff">01 · The Prompt Room</text>
    <text x="92" y="245" font-size="20" fill="#cfe6f5">Scrivi un prompt, l'AI genera</text>
    <text x="92" y="275" font-size="20" fill="#cfe6f5">un'opera in pochi secondi.</text>
    <!-- 2 -->
    <rect x="656" y="140" width="560" height="250" rx="16" fill="rgba(180,140,255,0.07)" stroke="rgba(180,140,255,0.3)"/>
    <text x="684" y="200" font-family="Orbitron, sans-serif" font-size="22" fill="#b48cff">02 · The Missing Thought</text>
    <text x="684" y="245" font-size="20" fill="#cfe6f5">Chi è l'autore? È originale?</text>
    <text x="684" y="275" font-size="20" fill="#cfe6f5">Cosa manca davvero?</text>
    <!-- 3 -->
    <rect x="64" y="420" width="560" height="250" rx="16" fill="rgba(255,180,84,0.07)" stroke="rgba(255,180,84,0.3)"/>
    <text x="92" y="480" font-family="Orbitron, sans-serif" font-size="22" fill="#ffb454">03 · Human Edit Lab</text>
    <text x="92" y="525" font-size="20" fill="#cfe6f5">Intervieni, modifica, trasforma:</text>
    <text x="92" y="555" font-size="20" fill="#cfe6f5">il valore nasce dalle scelte.</text>
    <!-- 4 -->
    <rect x="656" y="420" width="560" height="250" rx="16" fill="rgba(255,126,176,0.07)" stroke="rgba(255,126,176,0.3)"/>
    <text x="684" y="480" font-family="Orbitron, sans-serif" font-size="22" fill="#ff7eb0">04 · The Responsibility Wall</text>
    <text x="684" y="525" font-size="20" fill="#cfe6f5">"Userò l'AI per…,</text>
    <text x="684" y="555" font-size="20" fill="#cfe6f5">ma non le delegherò…"</text>
  </g>
  <text x="64" y="740" font-family="Inter, sans-serif" font-size="18" fill="#8ea4c2">Durata ~10–15 min · installazione interattiva ed educativa sull'uso dell'AI nelle arti</text>
</svg>
