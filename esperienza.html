<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Esperienza — Il mio universo — Dmitry Laurenzi, Media Designer</title>
  <meta name="description" content="Esplora il portfolio di Dmitry Laurenzi come una galassia 3D: vola con la tua astronave tra costellazioni di progetti e sistemi stellari." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js"
      }
    }
  </script>
  <style>
    :root {
      --bg: #03040a;
      --hud: #8fe9ff;
      --hud-dim: rgba(143, 233, 255, 0.55);
      --accent: #ffb347;
      --panel-bg: rgba(6, 12, 24, 0.72);
      --panel-border: rgba(120, 200, 255, 0.28);
      --font: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
      --mono: 'SF Mono', 'Consolas', 'Roboto Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: var(--font); color: var(--hud); cursor: default; }

    #scene { position: fixed; inset: 0; display: block; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #hud .panel { pointer-events: auto; }

    #labels { position: fixed; inset: 0; pointer-events: none; z-index: 8; overflow: hidden; }
    .label {
      position: absolute; transform: translate(-50%, -50%);
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--hud); text-shadow: 0 0 6px rgba(0,0,0,0.9);
      white-space: nowrap; pointer-events: none; transition: opacity 0.25s;
    }
    .label.constellation { font-size: 13px; font-weight: 600; color: #cfefff; }
    .label.constellation::before { content: '✦ '; color: var(--accent); }
    .label.star { font-size: 10px; color: var(--hud-dim); }
    .label.hidden { opacity: 0; }

    #topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 22px;
      background: linear-gradient(180deg, rgba(3,6,16,0.85), transparent);
      font-size: 13px; letter-spacing: 0.05em;
    }
    #breadcrumb { display: flex; align-items: center; gap: 10px; }
    #breadcrumb .crumb { opacity: 0.95; }
    #breadcrumb .sep { color: var(--hud-dim); }
    #breadcrumb .ctx { color: var(--accent); font-weight: 600; }
    #status-right { font-family: var(--mono); font-size: 12px; color: var(--hud-dim); text-align: right; }
    #status-right b { color: var(--hud); font-weight: 600; }

    /* Link di ritorno al portfolio */
    #to-portfolio {
      position: absolute; top: 54px; right: 18px; z-index: 12; pointer-events: auto;
      font-family: var(--font); font-size: 12px; letter-spacing: 0.05em; text-decoration: none;
      padding: 8px 14px; border-radius: 8px; color: #ffd9a0;
      background: rgba(255,179,71,0.16); border: 1px solid rgba(255,179,71,0.5);
      transition: background 0.15s;
    }
    #to-portfolio:hover { background: rgba(255,179,71,0.3); }

    #nav {
      position: absolute; top: 96px; left: 18px; width: 268px; max-height: calc(100vh - 180px);
      overflow-y: auto; padding: 14px;
      background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px;
      backdrop-filter: blur(8px);
    }
    #nav h2 { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--hud-dim); margin-bottom: 10px; }
    .const-group { margin-bottom: 6px; border-radius: 8px; overflow: hidden; }
    .const-head {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer;
      border-radius: 8px; transition: background 0.15s; font-size: 13px;
    }
    .const-head:hover { background: rgba(120, 200, 255, 0.10); }
    .const-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 8px currentColor; }
    .const-name { flex: 1; }
    .const-count { font-family: var(--mono); font-size: 11px; color: var(--hud-dim); }
    .const-stars { display: none; padding: 2px 0 6px 28px; }
    .const-group.open .const-stars { display: block; }
    .star-item {
      display: flex; align-items: center; gap: 8px; padding: 5px 8px; cursor: pointer;
      font-size: 12px; color: var(--hud-dim); border-radius: 6px; transition: background 0.15s, color 0.15s;
    }
    .star-item:hover { background: rgba(255, 179, 71, 0.10); color: var(--hud); }
    .star-item .sdot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }

    #info {
      position: absolute; top: 96px; right: 18px; width: 300px;
      padding: 16px; background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 12px; backdrop-filter: blur(8px);
      opacity: 0; transform: translateX(12px); transition: opacity 0.3s, transform 0.3s; pointer-events: none;
    }
    #info.show { opacity: 1; transform: none; pointer-events: auto; }
    #info .kicker { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
    #info h3 { font-size: 19px; margin: 4px 0 8px; color: #eaf7ff; }
    #info .meta { font-family: var(--mono); font-size: 11px; color: var(--hud-dim); margin-bottom: 10px; }
    #info .desc { font-size: 13px; line-height: 1.55; color: #cfe6f5; }
    #info .tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    #info .tag { font-size: 11px; padding: 3px 9px; border: 1px solid var(--panel-border); border-radius: 20px; color: var(--hud-dim); }
    #info .badge { display: inline-block; margin-top: 4px; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    #info .actions { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      pointer-events: auto; font-family: var(--font); font-size: 12px; letter-spacing: 0.04em;
      padding: 8px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--panel-border);
      background: rgba(120, 200, 255, 0.10); color: var(--hud); transition: background 0.15s, border 0.15s;
      text-decoration: none; display: inline-block;
    }
    .btn:hover { background: rgba(143, 233, 255, 0.22); border-color: var(--hud); }
    .btn.primary { background: rgba(255, 179, 71, 0.16); border-color: rgba(255, 179, 71, 0.5); color: #ffd9a0; }
    .btn.primary:hover { background: rgba(255, 179, 71, 0.3); }

    #controls {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px; padding: 9px 18px; font-family: var(--mono); font-size: 11px;
      color: var(--hud-dim); background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 30px; backdrop-filter: blur(8px); white-space: nowrap;
    }
    #controls kbd {
      font-family: var(--mono); color: var(--hud); background: rgba(120,200,255,0.12);
      border: 1px solid var(--panel-border); border-radius: 4px; padding: 1px 6px; margin-right: 3px;
    }
    #controls .grp { display: flex; align-items: center; }

    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 26px; height: 26px; opacity: 0.5; transition: opacity 0.3s; }
    #crosshair.hidden { opacity: 0; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--hud); }
    #crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
    #crosshair::after { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }

    #flash { position: absolute; inset: 0; background: #cfefff; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    #toast {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
      font-size: 26px; letter-spacing: 0.3em; text-transform: uppercase; color: #eaf7ff;
      text-shadow: 0 0 24px rgba(143,233,255,0.8); opacity: 0; transition: opacity 0.4s; text-align: center;
    }
    #toast.show { opacity: 1; }
    #toast small { display: block; font-size: 12px; letter-spacing: 0.2em; color: var(--hud-dim); margin-top: 8px; }

    #loading {
      position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; background: var(--bg);
      transition: opacity 0.8s; text-align: center;
    }
    #loading.done { opacity: 0; pointer-events: none; }
    #loading .title { font-size: 30px; letter-spacing: 0.4em; text-transform: uppercase; color: #eaf7ff; text-shadow: 0 0 30px rgba(143,233,255,0.7); }
    #loading .sub { font-size: 12px; letter-spacing: 0.25em; color: var(--hud-dim); text-transform: uppercase; }
    #loading .bar { width: 220px; height: 2px; background: rgba(120,200,255,0.2); overflow: hidden; border-radius: 2px; }
    #loading .bar i { display: block; height: 100%; width: 40%; background: var(--hud); animation: load 1.1s infinite ease-in-out; }
    @keyframes load { 0% { transform: translateX(-100%);} 100% { transform: translateX(350%);} }
    #loading .start-btn { margin-top: 6px; opacity: 0; transition: opacity 0.4s; }
    #loading.ready .start-btn { opacity: 1; }
    #loading.ready .bar { display: none; }
    #loading.ready .sub { display: none; }

    #nav::-webkit-scrollbar { width: 6px; }
    #nav::-webkit-scrollbar-thumb { background: rgba(120,200,255,0.25); border-radius: 4px; }

    @media (max-width: 720px) {
      #nav { width: 210px; }
      #info { width: 220px; }
      #controls { display: none; }
    }

    /* Toolbar (Portfolio / Osserva / Navicella) */
    #exp-toolbar { position: absolute; top: 54px; right: 18px; z-index: 12; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    #to-portfolio, .exp-btn {
      position: static; top: auto; right: auto; pointer-events: auto; cursor: pointer;
      font-family: var(--font); font-size: 12px; letter-spacing: 0.05em; text-decoration: none;
      padding: 8px 14px; border-radius: 8px; transition: background 0.15s;
      color: #ffd9a0; background: rgba(255,179,71,0.16); border: 1px solid rgba(255,179,71,0.5);
    }
    .exp-btn { color: var(--hud); background: rgba(120,200,255,0.12); border: 1px solid var(--panel-border); }
    #to-portfolio:hover, .exp-btn:hover { background: rgba(143,233,255,0.22); }

    /* Personalizzatore navicella */
    #ship-customizer {
      position: absolute; right: 18px; bottom: 70px; width: 262px; z-index: 14;
      background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px;
      padding: 14px; backdrop-filter: blur(8px);
      opacity: 0; transform: translateY(12px); pointer-events: none; transition: opacity 0.25s, transform 0.25s;
    }
    #ship-customizer.open { opacity: 1; transform: none; pointer-events: auto; }
    .cust-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; color: #eaf7ff; }
    .cust-x { background: none; border: none; color: var(--hud-dim); font-size: 16px; cursor: pointer; }
    .cust-x:hover { color: var(--hud); }
    .cust-row { margin-bottom: 11px; }
    .cust-row > label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--hud-dim); margin-bottom: 6px; }
    .swatches { display: flex; gap: 7px; flex-wrap: wrap; }
    .sw { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
    .sw.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.7); }
    .shapes { display: flex; gap: 6px; }
    .shp { flex: 1; font-family: var(--font); font-size: 11px; padding: 6px 4px; border-radius: 7px; cursor: pointer;
      color: var(--hud-dim); background: rgba(120,200,255,0.08); border: 1px solid var(--panel-border); }
    .shp.active { color: #08111f; background: var(--hud); border-color: var(--hud); }

    /* Modalità osservazione: nasconde tutta l'interfaccia */
    body.observe #hud, body.observe #labels, body.observe #exp-toolbar, body.observe #ship-customizer { display: none !important; }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="labels"></div>

  <div id="exp-toolbar">
    <a id="to-portfolio" href="index.html">← Portfolio</a>
    <button id="btn-observe" class="exp-btn">👁 Osserva</button>
    <button id="btn-customize" class="exp-btn">🛠 Navicella</button>
  </div>

  <div id="ship-customizer">
    <div class="cust-head"><span>Personalizza navicella</span><button id="cust-close" class="cust-x" aria-label="Chiudi">✕</button></div>
    <div class="cust-row">
      <label>Scafo</label>
      <div class="swatches">
        <button class="sw" data-part="hull" data-color="#cdd6e6" style="background:#cdd6e6"></button>
        <button class="sw" data-part="hull" data-color="#ff5a4d" style="background:#ff5a4d"></button>
        <button class="sw" data-part="hull" data-color="#ffd27f" style="background:#ffd27f"></button>
        <button class="sw" data-part="hull" data-color="#6be39a" style="background:#6be39a"></button>
        <button class="sw" data-part="hull" data-color="#b48cff" style="background:#b48cff"></button>
        <button class="sw" data-part="hull" data-color="#2a2f3a" style="background:#2a2f3a"></button>
      </div>
    </div>
    <div class="cust-row">
      <label>Accenti (ali)</label>
      <div class="swatches">
        <button class="sw" data-part="accent" data-color="#2a6cff" style="background:#2a6cff"></button>
        <button class="sw" data-part="accent" data-color="#ff7eb0" style="background:#ff7eb0"></button>
        <button class="sw" data-part="accent" data-color="#ffb347" style="background:#ffb347"></button>
        <button class="sw" data-part="accent" data-color="#37e0b0" style="background:#37e0b0"></button>
        <button class="sw" data-part="accent" data-color="#c46bff" style="background:#c46bff"></button>
        <button class="sw" data-part="accent" data-color="#ffffff" style="background:#ffffff"></button>
      </div>
    </div>
    <div class="cust-row">
      <label>Abitacolo</label>
      <div class="swatches">
        <button class="sw" data-part="glass" data-color="#7fd6ff" style="background:#7fd6ff"></button>
        <button class="sw" data-part="glass" data-color="#ffd27f" style="background:#ffd27f"></button>
        <button class="sw" data-part="glass" data-color="#ff9bf0" style="background:#ff9bf0"></button>
        <button class="sw" data-part="glass" data-color="#9affda" style="background:#9affda"></button>
        <button class="sw" data-part="glass" data-color="#ff7043" style="background:#ff7043"></button>
        <button class="sw" data-part="glass" data-color="#cfe6f5" style="background:#cfe6f5"></button>
      </div>
    </div>
    <div class="cust-row">
      <label>Motori</label>
      <div class="swatches">
        <button class="sw" data-part="flame" data-color="#66ccff" style="background:#66ccff"></button>
        <button class="sw" data-part="flame" data-color="#ff7e30" style="background:#ff7e30"></button>
        <button class="sw" data-part="flame" data-color="#b48cff" style="background:#b48cff"></button>
        <button class="sw" data-part="flame" data-color="#6be39a" style="background:#6be39a"></button>
        <button class="sw" data-part="flame" data-color="#ff5a4d" style="background:#ff5a4d"></button>
        <button class="sw" data-part="flame" data-color="#ffffff" style="background:#ffffff"></button>
      </div>
    </div>
    <div class="cust-row">
      <label>Forma</label>
      <div class="shapes">
        <button class="shp" data-shape="caccia">Caccia</button>
        <button class="shp" data-shape="esploratore">Esploratore</button>
        <button class="shp" data-shape="crociera">Crociera</button>
      </div>
    </div>
  </div>

  <div id="hud">
    <div id="topbar">
      <div id="breadcrumb" class="panel">
        <span class="crumb">IL MIO UNIVERSO</span>
      </div>
      <div id="status-right">
        <div>VELOCITÀ <b id="speed">0</b></div>
        <div id="mode-line">MODALITÀ <b id="mode">GALASSIA</b></div>
      </div>
    </div>

    <div id="nav" class="panel">
      <h2>Carta Stellare</h2>
      <div id="nav-list"></div>
    </div>

    <div id="info" class="panel">
      <div class="kicker" id="info-kicker">Progetto</div>
      <h3 id="info-title">—</h3>
      <div class="meta" id="info-meta"></div>
      <div class="desc" id="info-desc"></div>
      <div class="tags" id="info-tags"></div>
      <div class="actions" id="info-actions"></div>
    </div>

    <div id="controls" class="panel">
      <span class="grp"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> manovra</span>
      <span class="grp"><kbd>Mouse</kbd> guarda</span>
      <span class="grp"><kbd>Shift</kbd> turbo</span>
      <span class="grp"><kbd>Spazio</kbd> sali · <kbd>Ctrl</kbd> scendi</span>
      <span class="grp"><kbd>Click</kbd> seleziona</span>
    </div>

    <div id="crosshair"></div>
  </div>

  <div id="flash"></div>
  <div id="toast"></div>

  <div id="loading">
    <div class="title">Il mio universo</div>
    <div class="sub" id="loading-sub">Inizializzazione della galassia…</div>
    <div class="bar"><i></i></div>
    <button class="btn primary start-btn" id="start-btn">Avvia esplorazione ▸</button>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
